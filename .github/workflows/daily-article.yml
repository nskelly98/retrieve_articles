name: Daily Article

on:
  schedule:
    # 11:00 AM US Eastern (16:00 UTC during EST; adjust for DST as needed)
    - cron: "0 16 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-article:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Run daily article agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python -m retrieve_articles

      - name: Commit history if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_articles.json
          git diff --staged --quiet || git commit -m "chore: update seen articles history"
          git push
